<form class="mobile-form" id="mobile-form-submit">
  <img
    id="close-login-panel"
    src="images/logo/close-cross-svgrepo-com.svg"
    alt=""
    class="close-form-button"
  />
  <h1 class="form-title">Login Account:</h1>
  <div class="login-page-hidden" id="login-page">
    <label for="input-user-name"><b>Username</b></label>
    <input
      type="text"
      placeholder="input Username"
      name="uname"
      id="input-user-name"
      autocomplete="username"
    />
    <label for="input-user-pass"><b>Password</b></label>
    <div class="login-pass-input-field">
      <input
        type="password"
        placeholder="input password"
        name="pass"
        id="input-user-pass"
        autocomplete="current-password"
        required
      />
      <i
        class="fa-solid fa-eye toggle-password"
        data-target="input-user-pass"
        role="button"
        tabindex="0"
        aria-label="Toggle password visibility"
        id="eye"
      ></i>
    </div>
    <button type="submit" id="mobile-login-button" class="mobile-login-btn">
      Login
    </button>
    <button
      type="button"
      id="redirect-to-create-form"
      class="mobile-no-acc-btn"
    >
      Don't have account yet?
    </button>
    <label>
      <input
        type="checkbox"
        checked="checked"
        name="remember"
        id="mobile-remember-me"
        class="remember-me"
      />
      <span>Remember me</span>
    </label>
    <div class="cancel-forgot">
      <button type="button" id="mobile-cancel-input">Cancel</button>
      <p class="forgot-pass">Forgot <a id="forgot-password">password?</a></p>
    </div>
  </div>
</form>
<!--For covering the main page when cart is opened-->
<div id="overlay"></div>
