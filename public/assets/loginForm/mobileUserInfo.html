<form class="logged-in-user-info-panel" id="mogile-logged-in-panel">
  <img
    id="close-login-panel"
    src="images/logo/close-cross-svgrepo-com.svg"
    alt=""
    class="close-form-button"
  />
  <div class="profile-picture">
    <img
      src=""
      alt="profile picture"
      class="profile-pic"
      id="profile-picture"
    />
    <input type="file" id="profile-pic-upload" accept="image/*" hidden />
    <img
      src="images//logo/camera-add-photo-svgrepo-com.svg"
      alt="upload profile pic"
      class="upload-profile-pic"
      id="upload-pic-Btn"
    />
  </div>
  <p>Hello!</p>
  <h1 class="logged-in-user-name" id="mobile-user-to-log">Guest</h1>
  <button type="button" class="sign-out" id="mobile-signout-user">
    Sign out
  </button>
</form>
