<div class="cart-display-wrap">
  <div class="cart-item-list">
    <h3>Article Name: <span class="article-name"></span></h3>
    <h3>Article Original Price: $<span class="article-price"></span></h3>
    <h3>Selected Qty: <span class="article-quantity"></span></h3>
    <h3>Selected Size: <span class="article-size"></span></h3>
    <h3>Seller: <span class="article-seller"></span></h3>
    <img src="" alt="cart item image" class="article-image" />
    <h3 class="total-price-item">
      Article Total Price: $<span class="article-total-price"></span>
    </h3>
  </div>
  <div class="cart-item-del-button">
    <button type="button" class="article-delete-button">Delete Item</button>
  </div>
</div>
